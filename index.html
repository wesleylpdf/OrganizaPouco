<!DOCTYPE html>
<html lang="pt-PT" class="h-full bg-slate-50 dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organiza Pouco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
// Configuração do Tailwind para modo escuro
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 p-4 transition-colors duration-300 dark:bg-slate-900">

<!-- CONTÊINER PARA TOASTS -->
<div id="toast-container" class="fixed top-20 right-4 z-[1000] space-y-4"></div>

<!-- BOTÃO MODO ESCURO -->
 <button onclick="toggleDarkMode()" class="fixed top-4 right-4 z-[999] bg-white p-2 rounded-full shadow-lg border dark:bg-slate-800 dark:border-slate-700">
        <span id="theme-icon">☀️</span>
    </button>

<!-- TELA DE AUTENTICAÇÃO -->
 <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[999]">
        <div class="bg-white p-8 rounded-3xl text-center w-full max-w-sm mx-4 shadow-2xl">
            <h2 class="font-black text-xl mb-4 text-slate-800">Acesso Restrito</h2>
            <input type="password" id="auth-pass" class="border p-4 rounded-xl mb-4 w-full bg-slate-50 text-center" placeholder="Digite a senha">
            <button onclick="checkAuth()" class="bg-slate-900 text-white px-8 py-4 rounded-xl font-bold w-full hover:bg-slate-800 transition">Entrar</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto">
 
<!-- CABEÇALHO E RESUMO DO CICLO --> 
        <div class="bg-white border border-slate-200 p-6 rounded-3xl shadow-sm mb-8 dark:bg-slate-800 dark:border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeCycle(-1)" class="bg-slate-100 px-4 py-2 rounded-lg font-bold hover:bg-slate-200 text-sm dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600">← Anterior</button>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest" id="cycle-dates">Resumo do Ciclo</span>
                <button onclick="changeCycle(1)" class="bg-slate-100 px-4 py-2 rounded-lg font-bold hover:bg-slate-200 text-sm dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600">Próximo →</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><span class="text-[10px] text-emerald-600 uppercase font-bold">Entradas</span><h2 id="total-entradas" class="text-xl font-bold text-emerald-600">R$ 0,00</h2></div>
                <div><span class="text-[10px] text-rose-600 uppercase font-bold">Saídas</span><h2 id="total-saidas" class="text-xl font-bold text-rose-600">R$ 0,00</h2></div>
            </div>
            <div class="border-t border-slate-200 pt-3 flex justify-between items-end dark:border-slate-700">
                <div><span class="text-[10px] text-slate-400 uppercase font-bold">Saldo Final</span><h2 id="cycle-total" class="text-3xl font-black text-slate-900 dark:text-white">R$ 0,00</h2></div>
                <div class="text-[9px] text-slate-500 font-bold uppercase">Versão: <span id="version-display">1.0.4</span></div>
            </div>
        </div>

<!-- FORMULÁRIO DE TRANSAÇÃO -->
        <div class="rounded-3xl p-6 border shadow-sm mb-8 bg-slate-50 border-slate-200 dark:bg-slate-800 dark:border-slate-700">
            <h3 class="font-bold text-lg mb-4 text-slate-800 dark:text-white" id="form-title">Nova Transação</h3>
            <form id="transaction-form" onsubmit="saveTransaction(event)" class="space-y-4">
                <input type="hidden" id="input-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="number" id="input-value" step="0.01" required class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 dark:border-slate-700 dark:text-white" placeholder="Valor">
                    <input type="date" id="input-date" required class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 dark:border-slate-700 dark:text-white">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="input-type" class="w-full p-3 rounded-xl border bg-white font-bold dark:bg-slate-900 dark:border-slate-700 dark:text-white"><option value="saida">Saída (-)</option><option value="entrada">Entrada (+)</option></select>
                    <select id="input-category" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 dark:border-slate-700 dark:text-white">
                        <option value="Alimentação">🍕 Alimentação</option>
                        <option value="Moradia">🏠 Moradia</option>
                        <option value="Transporte">🚗 Transporte</option>
                        <option value="Lazer">🎮 Lazer</option>
                        <option value="Saúde">🏥 Saúde</option>
                        <option value="Educação">📚 Educação</option>
                        <option value="Investimentos">📈 Investimentos</option>
                        <option value="Outros">✨ Outros</option>
						<option value="Salário">💰 Salário</option>
                    </select>
                </div>
                <label class="flex items-center gap-2 text-sm font-bold text-slate-600 dark:text-slate-300"><input type="checkbox" id="input-fixed"> É transação fixa?</label>
                <input type="text" id="input-description" required class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 dark:border-slate-700 dark:text-white" placeholder="Descrição">
                <button type="submit" id="save-btn" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition dark:bg-slate-700">Guardar</button>
                <button type="button" onclick="resetForm()" id="cancel-btn" class="hidden w-full py-2 bg-slate-200 rounded-xl font-bold dark:bg-slate-600 dark:text-white">Cancelar Edição</button>
            </form>
        </div>

<!-- DISTRIBUIÇÃO DE GASTOS (GRÁFICO) -->
        <div class="p-6 rounded-3xl shadow-sm mb-8 border border-slate-200 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-800 dark:border-slate-700" style="height: 320px;">
            <h3 class="font-bold text-sm mb-2 text-slate-800 w-full text-left dark:text-white">Distribuição de Gastos</h3>
            <div class="relative w-full h-full flex items-center justify-center"><canvas id="categoryChart" style="max-height: 220px;"></canvas></div>
        </div>
	
<!-- BOTÃO FIXOS E FILTRO -->	
        <div class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex items-center gap-4">
                <button onclick="applyFixedTransactions()" id="fixed-btn" class="flex items-center gap-2 bg-emerald-600 text-white px-4 py-3 rounded-full font-bold text-xs hover:bg-emerald-700 transition shadow-lg"><span>📋</span>Repetir custos fixos</button>
                <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-slate-600 bg-slate-50 px-4 py-3 rounded-full border border-slate-200 shadow-sm dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300">
                    <input type="checkbox" id="filter-fixed" onchange="updateDashboard()" class="w-4 h-4"> Transações Fixas
                </label>
            </div>
            <div class="flex gap-2">
                <select id="export-format" class="bg-white dark:bg-slate-800 dark:text-white border px-3 rounded-full text-xs font-bold w-1/3">
                <option value="csv">Exportar como CSV</option>
                <option value="pdf">Exportar como PDF</option>
                <option value="xlsx">Exportar como Excel</option>
                </select>
                <button onclick="exportData()" id="export-btn" class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold text-xs hover:bg-blue-700 transition">Exportar</button>
            </div>
        </div>

<!-- LISTA DE TRANSAÇÕES -->        
        <div id="transaction-list-container" class="space-y-3 pb-10"></div>
    </main>
