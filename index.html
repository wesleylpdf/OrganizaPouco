<!DOCTYPE html>
<html lang="pt-PT" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organiza Pouco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-4">

<div id="auth-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[999]">
    <div class="bg-white p-8 rounded-3xl text-center w-full max-w-sm mx-4 shadow-2xl">
        <h2 class="font-black text-xl mb-4 text-slate-800">Acesso Restrito</h2>
        <input type="password" id="auth-pass" class="border p-4 rounded-xl mb-4 w-full bg-slate-50 text-center" placeholder="Digite a senha">
        <button onclick="checkAuth()" class="bg-slate-900 text-white px-8 py-4 rounded-xl font-bold w-full hover:bg-slate-800 transition">Entrar</button>
    </div>
</div>

<main class="max-w-4xl mx-auto">
    <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl mb-8">
        <div class="flex justify-between items-center mb-4">
            <button onclick="changeCycle(-1)" class="bg-slate-800 px-4 py-2 rounded-lg font-bold hover:bg-slate-700 text-sm">← Anterior</button>
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest" id="cycle-dates">Resumo do Ciclo</span>
            <button onclick="changeCycle(1)" class="bg-slate-800 px-4 py-2 rounded-lg font-bold hover:bg-slate-700 text-sm">Próximo →</button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div><span class="text-[10px] text-emerald-400 uppercase font-bold">Entradas</span><h2 id="total-entradas" class="text-xl font-bold text-emerald-400">R$ 0,00</h2></div>
            <div><span class="text-[10px] text-rose-400 uppercase font-bold">Saídas</span><h2 id="total-saidas" class="text-xl font-bold text-rose-400">R$ 0,00</h2></div>
        </div>
        <div class="border-t border-slate-700 pt-3 flex justify-between items-end">
            <div><span class="text-[10px] text-slate-400 uppercase font-bold">Saldo Final</span><h2 id="cycle-total" class="text-3xl font-black">R$ 0,00</h2></div>
            <div class="text-[9px] text-slate-500 font-bold uppercase">Versão: <span id="version-display">1.0.0</span></div>
        </div>
    </div>

    <div class="bg-white rounded-3xl p-6 border shadow-sm mb-8">
        <h3 class="font-bold text-lg mb-4 text-slate-800" id="form-title">Nova Transação</h3>
        <form id="transaction-form" onsubmit="saveTransaction(event)" class="space-y-4">
            <input type="hidden" id="input-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="number" id="input-value" step="0.01" required class="w-full p-3 rounded-xl border bg-slate-50" placeholder="Valor">
                <input type="date" id="input-date" required class="w-full p-3 rounded-xl border bg-slate-50">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <select id="input-type" class="w-full p-3 rounded-xl border bg-slate-50 font-bold"><option value="saida">Saída (-)</option><option value="entrada">Entrada (+)</option></select>
                <select id="input-category" class="w-full p-3 rounded-xl border bg-slate-50">
                    <option value="Salário">Salário</option><option value="Alimentação">Alimentação</option><option value="Moradia">Moradia</option><option value="Transporte">Transporte</option><option value="Lazer">Lazer</option><option value="Saúde">Saúde</option><option value="Educação">Educação</option><option value="Investimentos">Investimentos</option><option value="Outros">Outros</option>
                </select>
            </div>
            <label class="flex items-center gap-2 text-sm font-bold text-slate-600"><input type="checkbox" id="input-fixed"> É transação fixa?</label>
            <input type="text" id="input-description" required class="w-full p-3 rounded-xl border bg-slate-50" placeholder="Descrição">
            <button type="submit" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition">Guardar</button>
            <button type="button" onclick="resetForm()" id="cancel-btn" class="hidden w-full py-2 bg-slate-200 rounded-xl font-bold">Cancelar Edição</button>
        </form>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border flex flex-col items-center justify-center" style="height: 320px;">
        <h3 class="font-bold text-sm mb-2 text-slate-800 w-full text-left">Distribuição de Gastos</h3>
        <div class="relative w-full h-full flex items-center justify-center"><canvas id="categoryChart" style="max-height: 220px;"></canvas></div>
    </div>

    <div class="mb-6 flex items-center gap-4">
        <button onclick="applyFixedTransactions()" class="flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-full font-bold text-sm hover:bg-emerald-700 transition shadow-lg">
            <span>📋</span> Aplicar fixos do ciclo anterior
        </button>
        <label class="flex items-center gap-2 cursor-pointer text-sm font-bold text-slate-600 bg-white px-4 py-3 rounded-full border shadow-sm">
            <input type="checkbox" id="filter-fixed" onchange="updateDashboard()" class="w-4 h-4"> Mostrar apenas Transações Fixas 
        </label>
    </div>

    <div id="transaction-list-container" class="space-y-3 pb-10"></div>
</main>

<script>
    const APP_VERSION = "1.0.4";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzVePdMPV8vjYAiCfMrs9XAxeZ5iejZOIMdDLZXEOZbec2MYC_83TWfVYanPKqgxkmkGw/exec";
    let allTransactions = [];
    let cycleOffset = 0;
    let myChart;

    document.getElementById('version-display').innerText = APP_VERSION;

    function checkAuth() {
        if(document.getElementById('auth-pass').value === "180229") {
            document.getElementById('auth-screen').classList.add('hidden');
        } else { alert("Senha incorreta!"); }
    }

    async function fetchTransactions() {
        try {
            const res = await fetch(WEB_APP_URL);
            allTransactions = await res.json();
            updateDashboard();
        } catch (e) { console.error("Erro:", e); }
    }

    async function applyFixedTransactions() {
        // Pop-up de confirmação
        if (!confirm("Tem certeza que deseja aplicar as transações fixas do ciclo anterior?")) return;

        const now = new Date();
        const targetMonth = now.getMonth() + cycleOffset;
        const startDate = new Date(now.getFullYear(), targetMonth - 2, 9);
        const endDate = new Date(now.getFullYear(), targetMonth - 1, 8);
        const fixedTxs = allTransactions.filter(t => t.isFixed === "Sim" && new Date(t.date + 'T00:00:00') >= startDate && new Date(t.date + 'T00:00:00') <= endDate);

        if (fixedTxs.length === 0) { alert("Nenhum fixo no ciclo anterior."); return; }
        for (const tx of fixedTxs) {
            const newDate = new Date(tx.date);
            newDate.setMonth(newDate.getMonth() + 1);
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...tx, date: newDate.toISOString().split('T')[0], id: Date.now() + Math.random(), action: 'add' }) });
        }
        alert("Fixos aplicados!");
        fetchTransactions();
    }

    function changeCycle(dir) { cycleOffset += dir; updateDashboard(); }

    function updateDashboard() {
        const now = new Date();
        const targetMonth = now.getMonth() + cycleOffset;
        const startDate = new Date(now.getFullYear(), targetMonth - 1, 9);
        const endDate = new Date(now.getFullYear(), targetMonth, 8);
        const showOnlyFixed = document.getElementById('filter-fixed').checked;

        let filtered = allTransactions.filter(t => {
            const d = new Date(t.date + 'T00:00:00');
            return d >= startDate && d <= endDate && (showOnlyFixed ? t.isFixed === "Sim" : true);
        });

        const entradas = filtered.filter(t => t.type === 'entrada').reduce((acc, t) => acc + parseFloat(t.value || 0), 0);
        const saidas = filtered.filter(t => t.type === 'saida').reduce((acc, t) => acc + parseFloat(t.value || 0), 0);
        
        document.getElementById('total-entradas').innerText = `R$ ${entradas.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('total-saidas').innerText = `R$ ${saidas.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('cycle-total').innerText = `R$ ${(entradas - saidas).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('cycle-dates').innerText = `${startDate.toLocaleDateString('pt-BR')} a ${endDate.toLocaleDateString('pt-BR')}`;
        
        renderList(filtered);
        updateChart(filtered.filter(t => t.type === 'saida'));
    }

    function updateChart(saidas) {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        const groups = saidas.reduce((acc, t) => { acc[t.category] = (acc[t.category] || 0) + parseFloat(t.value || 0); return acc; }, {});
        if (myChart) myChart.destroy();
        if (Object.keys(groups).length === 0) return;
        myChart = new Chart(ctx, {
            type: 'pie',
            data: { labels: Object.keys(groups), datasets: [{ data: Object.values(groups), backgroundColor: ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#64748b', '#0ea5e9', '#d946ef'] }] },
            options: { responsive: true, maintainAspectRatio: false, layout: { padding: 15 }, plugins: { legend: { display: false } } }
        });
    }

    async function saveTransaction(e) {
        e.preventDefault();
        const tx = {
            date: document.getElementById('input-date').value,
            value: parseFloat(document.getElementById('input-value').value).toFixed(2),
            category: document.getElementById('input-category').value,
            type: document.getElementById('input-type').value,
            isFixed: document.getElementById('input-fixed').checked ? "Sim" : "Não",
            description: document.getElementById('input-description').value,
            id: document.getElementById('input-id').value || Date.now(),
            action: document.getElementById('input-id').value ? 'edit' : 'add'
        };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(tx) });
        alert("Salvo!");
        resetForm();
        fetchTransactions();
    }

    async function deleteTx(id) {
        if(!confirm("Apagar?")) return;
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
        fetchTransactions();
    }

    function editTx(id, desc, val, cat, date, type, isFixed) {
        document.getElementById('input-id').value = id;
        document.getElementById('input-description').value = desc;
        document.getElementById('input-value').value = val;
        document.getElementById('input-category').value = cat;
        document.getElementById('input-type').value = type;
        document.getElementById('input-fixed').checked = (isFixed === "Sim");
        document.getElementById('input-date').value = date;
        document.getElementById('form-title').innerText = "Editar Transação";
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function resetForm() {
        document.getElementById('transaction-form').reset();
        document.getElementById('input-id').value = '';
        document.getElementById('form-title').innerText = "Nova Transação";
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    function renderList(transactions) {
        const container = document.getElementById('transaction-list-container');
        container.innerHTML = transactions.map(t => `
            <div class="p-4 bg-white border rounded-xl flex justify-between items-center shadow-sm">
                <div>
                    <span class="block font-bold text-sm">${t.description} ${t.isFixed === "Sim" ? '📌' : ''}</span>
                    <span class="text-[10px] text-slate-500">${t.category} | ${t.date.split('-').reverse().join('/')}</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="font-bold ${t.type === 'entrada' ? 'text-emerald-600' : 'text-rose-600'} text-sm">${t.type === 'entrada' ? '+' : '-'} R$ ${parseFloat(t.value).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                    <button onclick="editTx('${t.id}', '${t.description}', '${t.value}', '${t.category}', '${t.date}', '${t.type}', '${t.isFixed}')" class="text-blue-500 text-xs">Editar</button>
                    <button onclick="deleteTx('${t.id}')" class="text-rose-500 text-xs">Excluir</button>
                </div>
            </div>
        `).join('');
    }

    window.onload = () => {
        document.getElementById('input-date').valueAsDate = new Date();
        const now = new Date();
        cycleOffset = (now.getDate() < 9) ? 0 : 1;
        fetchTransactions();
    };
</script>
</body>
 <! https://docs.google.com/spreadsheets/d/1rrgM3dF1oU-c7hD_rFFlICxIru67y8xtq4zcEVh8rWo/edit?gid=0#gid=0  gith hub financeiro canvas funcional>   
</html>
